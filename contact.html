                        <div class="contact__address">
                            <h5>Contact info</h5>
                            <ul>
                                <li>
                                    <h6><i class="fa-solid fa-location-dot"></i> Address</h6>
                                    <p>160 Pennsylvania Ave NW, Washington, Castle, PA 16101-5161</p>
                                </li>
                                <li>
                                    <h6><i class="fa-solid fa-phone"></i> Phone</h6>
                                    <p><span>125-711-811</span><span>125-668-886</span></p>
                                </li>
                                <li>
                                    <h6><i class="fa-solid fa-headphones"></i> Support</h6>
                                    <p>Support.photography@gmail.com</p>
                                </li>
                            </ul>
                        </div>
                        <div class="contact__form">
                            <h5 id="contact-form-heading">Send Message</h5>
                            <form action="#" id="contact-form" class="validated-form" novalidate aria-labelledby="contact-form-heading">
                                <div class="form-group">
                                    <label for="contact-name">Your Name <span aria-hidden="true">*</span></label>
                                    <input type="text" id="contact-name" name="name" required aria-required="true" autocomplete="name" minlength="2">
                                    <span class="error-message" role="alert" aria-live="polite"></span>
                                </div>
                                <div class="form-group">
                                    <label for="contact-email">Email Address <span aria-hidden="true">*</span></label>
                                    <input type="email" id="contact-email" name="email" required aria-required="true" autocomplete="email">
                                    <span class="error-message" role="alert" aria-live="polite"></span>
                                </div>
                                <div class="form-group">
                                    <label for="contact-subject">Subject</label>
                                    <input type="text" id="contact-subject" name="subject">
                                </div>
                                <div class="form-group">
                                    <label for="contact-message">Message <span aria-hidden="true">*</span></label>
                                    <textarea id="contact-message" name="message" rows="5" required aria-required="true" minlength="10"></textarea>
                                    <span class="error-message" role="alert" aria-live="polite"></span>
                                </div>
                                <button type="submit" class="site-btn">Send Message</button>
                            </form>
                        </div>
